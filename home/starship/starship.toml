# Minimal starship prompt
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nix_shell\
$line_break\
$character"""

[username]
show_always = false
format = "[$user]($style)@"

[hostname]
ssh_only = true
format = "[$hostname]($style):"

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[nix_shell]
format = "[$symbol$state]($style) "
symbol = " "

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"
